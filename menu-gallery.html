<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu & Gallery | Arisha Kitchen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c9a24d;
      --dark: #0e0e0e;
      --light: #f5f5f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--dark);
      color: var(--light);
    }

    section {
      padding: 100px 10%;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
    }

    h2 span { color: var(--gold); }

    /* ===== MENU ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .menu-item {
      border: 1px solid rgba(255,255,255,0.12);
      padding: 22px;
      transition: 0.3s;
    }

    .menu-item:hover {
      border-color: var(--gold);
      transform: translateY(-5px);
    }

    .menu-item h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
    }

    .price {
      float: right;
      color: var(--gold);
      font-weight: 500;
    }

    /* ===== GALLERY ===== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
      margin-top: 40px;
    }

    .gallery img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      filter: brightness(0.85);
      transition: 0.4s ease;
    }

    .gallery img:hover {
      filter: brightness(1);
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.6;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<!-- MENU -->
<section>
  <h2>Our <span>Menu</span></h2>

  <div class="menu-grid">
    <div class="menu-item"><h4>Shahi Paneer <span class="price">₹220</span></h4></div>
    <div class="menu-item"><h4>Matar Paneer <span class="price">₹200</span></h4></div>
    <div class="menu-item"><h4>Paneer Tikka <span class="price">₹250</span></h4></div>
    <div class="menu-item"><h4>Chicken Handi <span class="price">₹320</span></h4></div>
    <div class="menu-item"><h4>Mutton Handi <span class="price">₹420</span></h4></div>
    <div class="menu-item"><h4>Biryani <span class="price">₹180</span></h4></div>
  </div>
</section>

<!-- GALLERY -->
<section>
  <h2>Photo <span>Gallery</span></h2>

  <div class="gallery">
    <img src="assets/gallery/img1.jpeg">
    <img src="assets/gallery/img2.jpeg">
    <img src="assets/gallery/img3.jpeg">
    <img src="assets/gallery/img4.jpeg">
  </div>
</section>

<footer>
  © 2026 Arisha Kitchen
</footer>

</body>
</html>
